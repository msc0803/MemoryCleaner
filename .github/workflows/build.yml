name: Build Memory Cleaner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: .
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: List files
      run: |
        dir
        type go.mod

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '>=1.20.0'

    - name: Build
      run: go build -v -ldflags="-H windowsgui -s -w" -o MemoryCleaner.exe .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MemoryCleaner
        path: MemoryCleaner.exe
